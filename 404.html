<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Platform</title>
  <script>
    (function () {
      const path = window.location.pathname.replace(/\/+$/, "");
      const frontendIndex = path.indexOf("/frontend");
      const target = frontendIndex >= 0
        ? `${path.slice(0, frontendIndex)}/frontend/login.html`
        : `${path.replace(/\/404\.html$/, "")}/frontend/login.html`;

      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirecting to the exam platform...</p>
  <p><a href="./frontend/login.html">Continue to login</a></p>
</body>
</html>
