<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Platform | Instructions</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body data-page="instructions">
  <main class="page-shell">
    <div class="page-toolbar">
      <a class="secondary-button" href="./login.html">Home</a>
    </div>
    <section class="card">
      <h1>Waiting Room</h1>
      <p id="waiting-room-summary" class="lead">Loading your exam access details...</p>
      <div id="waiting-room-meta" class="meta-grid"></div>
      <ul class="simple-list">
        <li>The exam is not timed.</li>
        <li>You can move between questions before submitting.</li>
        <li>Your answers save automatically when changed.</li>
        <li>Marks will not be shown online after submission.</li>
      </ul>
      <div id="waiting-room-status" class="notice" aria-live="polite"></div>
      <div class="actions">
        <a class="secondary-button" href="./enter-code.html">Back</a>
        <button class="primary-button" id="start-exam-link" type="button" disabled>Start exam</button>
      </div>
    </section>
  </main>

  <script type="module" src="./js/exam.js"></script>
</body>
</html>
